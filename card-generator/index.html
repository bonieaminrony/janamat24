<!DOCTYPE html>
<html lang="bn" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <meta name="facebook-domain-verification" content="7shbb221u9inz4csjefgpyuud8la1v" />
    <title>Janamat24 - News Card Generator</title>
    <!-- html2canvas for downloading the div as image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
    <style>
        :root {
            --navy-blue: #1C2956;
            --red: #E31820;
            --gray: #333333;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            gap: 20px;
        }
        .controls {
            width: 400px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-height: 90vh;
            overflow-y: auto;
        }
        .controls h2 {
            margin-top: 0;
            color: var(--navy-blue);
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: var(--navy-blue);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #121c3b;
        }
        button.download-btn {
            background-color: #28a745;
            font-size: 18px;
            padding: 15px;
            margin-top: 20px;
        }
        button.download-btn:hover {
            background-color: #218838;
        }
        .preview-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        /* The Card Wrapper */
        #card-preview {
            position: relative;
            width: 800px; /* Fixed width for consistent generation */
            height: 1000px; /* Assuming 4:5 ratio roughly, will adjust via JS if template is different */
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            overflow: hidden;
            font-family: 'SolaimanLipi', sans-serif; /* Bengali Font */
        }
        #template-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            object-fit: fill;
        }
        #news-image {
            position: absolute;
            top: 28.5%; /* Position of the black box */
            left: 6.5%;
            width: 87%;
            height: 44.8%;
            z-index: 2;
            background-color: #000;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        #card-date {
            position: absolute;
            top: 4.8%;
            left: 6.5%;
            font-size: 20px;
            color: #444;
            z-index: 3;
            font-weight: bold;
        }
        #card-headline {
            position: absolute;
            top: 9.5%;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 3;
            padding: 0 5%;
            box-sizing: border-box;
            line-height: 1.4;
            letter-spacing: 0px !important;
            font-variant-ligatures: normal !important;
        }
        .hl-line1 {
            color: var(--navy-blue);
            font-size: 45px;
            font-weight: bold;
            letter-spacing: 0px !important;
        }
        .hl-line2 {
            color: var(--red);
            font-size: 45px;
            font-weight: bold;
            letter-spacing: 0px !important;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #d9534f;
            font-weight: bold;
            margin-top: 10px;
        }
        
        /* Fine-tuning controls */
        .fine-tune {
            background: #f9f9f9;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-top: 20px;
        }
        .fine-tune input[type="range"] {
            width: 100%;
        }

        /* News Detail Panel */
        .news-detail-panel {
            display: none;
            margin-top: 24px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.10);
            overflow: hidden;
            max-width: 800px;
            width: 100%;
        }
        .news-detail-header {
            background: var(--navy-blue);
            color: #fff;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .news-detail-header h3 {
            margin: 0;
            font-size: 17px;
            font-family: 'SolaimanLipi', sans-serif;
        }
        .category-badge {
            display: none;
            background: var(--red);
            color: #fff;
            font-size: 13px;
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-family: 'SolaimanLipi', sans-serif;
            white-space: nowrap;
        }
        .news-detail-body {
            padding: 20px 24px;
        }
        .news-excerpt {
            font-size: 17px;
            color: var(--navy-blue);
            font-weight: bold;
            line-height: 1.7;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f0f0f0;
            font-family: 'SolaimanLipi', sans-serif;
        }
        .news-content-area {
            color: #333;
            line-height: 1.85;
            font-size: 16px;
            font-family: 'SolaimanLipi', sans-serif;
        }
        .news-content-area p {
            margin: 0 0 14px 0;
            text-align: justify;
        }
        .news-content-area p:last-child {
            margin-bottom: 0;
        }
        .no-content-msg {
            color: #aaa;
            font-style: italic;
            font-size: 15px;
            text-align: center;
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <div class="controls">
        <h2>কার্ড জেনারেটর</h2>
        
        <div class="form-group">
            <label>টেম্পলেট ছবি (একবার আপলোড করলেই হবে):</label>
            <div style="display: flex; gap: 8px;">
                <input type="file" id="template-upload" accept="image/*" style="flex: 1;">
                <button type="button" onclick="resetTemplate()" style="width: auto; background-color: #666; color: white; border: none; border-radius: 4px; padding: 10px 15px; margin-top: 0; cursor: pointer; font-size: 14px;">রিসেট</button>
            </div>
        </div>

        <hr style="margin:15px 0; border:0; border-top:1px solid #eee;">

        <div class="form-group">
            <label style="font-size: 18px; color: var(--red);">নিউজের লিংক (URL) দিন:</label>
            <input type="text" id="news-url" placeholder="https://janamat24.com/news/..." style="font-size: 16px; padding: 12px;">
            <button onclick="fetchNewsData()" id="fetch-btn" style="background-color: var(--red); padding: 15px; font-size: 18px;">কার্ড তৈরি করুন 🚀</button>
            <div id="loading" class="loading" style="display:none; color: #d9534f; font-weight: bold; text-align: center; margin-top:10px;">অপেক্ষা করুন, এআই ডাটা কালেক্ট করছে...</div>
        </div>
        
        <button class="download-btn" onclick="downloadCard()">Download Card 📥</button>

        <div style="margin-top: 30px;">
            <button onclick="document.getElementById('advanced-settings').style.display = document.getElementById('advanced-settings').style.display === 'none' ? 'block' : 'none'" style="background: none; color: #666; font-size: 14px; text-decoration: underline; padding: 0; box-shadow: none; width: auto; font-weight: normal;">ম্যানুয়াল সেটিং (প্রয়োজন হলে)</button>
            
            <div id="advanced-settings" style="display: none; margin-top: 15px; padding: 15px; background: #f9f9f9; border-radius: 8px; border: 1px solid #ddd;">
                <div class="form-group">
                    <label>তারিখ:</label>
                    <input type="text" id="date-input" value="">
                </div>

                <div class="form-group">
                    <label>প্রথম লাইন (সম্পূর্ণ নীল):</label>
                    <input type="text" id="headline-1" placeholder="যেমন: ‘লাব্বাইক আল্লাহুম্মা লাব্বাইক’">
                </div>

                <div class="form-group">
                    <label>দ্বিতীয় লাইন (প্রথম অংশ - নীল):</label>
                    <input type="text" id="headline-2-blue" placeholder="যেমন: ধ্বনিতে">
                </div>
                
                <div class="form-group">
                    <label>দ্বিতীয় লাইন (দ্বিতীয় অংশ - লাল):</label>
                    <input type="text" id="headline-2-red" placeholder="যেমন: মুখর আরাফাত ময়দান">
                </div>

                <div class="form-group">
                    <label>ছবির URL (সরাসরি ছবির লিংক দিন):</label>
                    <input type="text" id="image-url" oninput="setProxiedImage(this.value)">
                    <p style="margin: 5px 0; font-size: 13px; color: #E31820;"><b>সরাসরি ছবি আপলোড করুন:</b></p>
                    <input type="file" id="news-image-upload" accept="image/*">
                </div>

                <div class="fine-tune">
                    <label>লেখা ও ছবি পজিশন ঠিক করুন:</label>
                    <small>Font Size Zoom (লেখা ছোট/বড় করুন):</small>
                    <input type="range" id="font-size-offset" min="-15" max="15" step="1" value="0" oninput="updateFontSizeOffset()">
                    
                    <small style="margin-top: 10px; display: block;">Top Position:</small>
                    <input type="range" id="pos-top" min="20" max="40" step="0.1" value="28.5" oninput="updateImagePos()">
                    <small>Height:</small>
                    <input type="range" id="pos-height" min="30" max="60" step="0.1" value="44.8" oninput="updateImagePos()">
                </div>
            </div>
        </div>
    </div>

    <div class="preview-container" style="flex-direction: column; align-items: center;">
        <div id="card-preview">
            <img id="template-bg" src="/card-news-bg-default-v2.png" alt="">
            <div id="card-date">২৬ মে ২০২৬</div>
            <div id="card-headline">
                <div class="hl-line1" id="preview-line1">‘লাব্বাইক আল্লাহুম্মা লাব্বাইক’</div>
                <div class="hl-line2" id="preview-line2">
                    <span id="preview-line2-blue" style="color: var(--navy-blue);">ধ্বনিতে </span>
                    <span id="preview-line2-red" style="color: var(--red);">মুখর আরাফাত ময়দান</span>
                </div>
            </div>
            <div id="news-image"></div>
        </div>

        <!-- News Detail Panel -->
        <div class="news-detail-panel" id="news-detail-panel">
            <div class="news-detail-header">
                <h3>📰 বিস্তারিত নিউজ</h3>
                <span class="category-badge" id="category-badge"></span>
            </div>
            <div class="news-detail-body">
                <div class="news-excerpt" id="news-excerpt-display" style="display:none;"></div>
                <div class="news-content-area" id="news-content-display">
                    <div class="no-content-msg">নিউজের লিংক দিলে বিস্তারিত এখানে দেখাবে।</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Set today's date in Bengali automatically
        const engToBng = {'0':'০','1':'১','2':'২','3':'৩','4':'৪','5':'৫','6':'৬','7':'৭','8':'৮','9':'৯'};
        const months = ['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];
        
        function getBengaliDate() {
            const d = new Date();
            let day = d.getDate().toString().split('').map(c => engToBng[c]).join('');
            let year = d.getFullYear().toString().split('').map(c => engToBng[c]).join('');
            let month = months[d.getMonth()];
            return `${day} ${month} ${year}`;
        }

        document.getElementById('date-input').value = getBengaliDate();
        document.getElementById('card-date').innerText = getBengaliDate();

        let fontSizeOffset = 0;
        function updateFontSizeOffset() {
            fontSizeOffset = parseInt(document.getElementById('font-size-offset').value) || 0;
            adjustFontSize();
        }

        function adjustFontSize() {
            const line1 = document.getElementById('preview-line1').innerText;
            const line2Blue = document.getElementById('preview-line2-blue').innerText;
            const line2Red = document.getElementById('preview-line2-red').innerText;
            const line2 = line2Blue + line2Red;
            
            const maxLen = Math.max(line1.length, line2.length);
            
            let fontSize = 48;
            if (maxLen > 18) {
                // Base font size is 48px. Usable width is 720px.
                // In Bengali, average character width is roughly 0.45 * font size in Tiro Bangla.
                fontSize = Math.floor(720 / (maxLen * 0.45));
                if (fontSize > 48) fontSize = 48;
                if (fontSize < 36) fontSize = 36; // Keep it readable and clear
            }
            
            const finalSize = fontSize + fontSizeOffset;
            document.getElementById('preview-line1').style.fontSize = finalSize + 'px';
            document.getElementById('preview-line2').style.fontSize = finalSize + 'px';
        }

        // Live update inputs to preview
        document.getElementById('date-input').addEventListener('input', function(e) {
            document.getElementById('card-date').innerText = e.target.value;
        });
        document.getElementById('headline-1').addEventListener('input', function(e) {
            document.getElementById('preview-line1').innerText = e.target.value;
            adjustFontSize();
        });
        document.getElementById('headline-2-blue').addEventListener('input', function(e) {
            document.getElementById('preview-line2-blue').innerText = e.target.value + "\u00A0";
            adjustFontSize();
        });
        document.getElementById('headline-2-red').addEventListener('input', function(e) {
            document.getElementById('preview-line2-red').innerText = e.target.value;
            adjustFontSize();
        });

        // Handle Template Upload
        document.getElementById('template-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const imgUrl = event.target.result;
                    const templateImg = document.getElementById('template-bg');
                    templateImg.src = imgUrl;
                    const img = new Image();
                    img.onload = function() {
                        const ratio = img.height / img.width;
                        document.getElementById('card-preview').style.height = (800 * ratio) + 'px';
                    };
                    img.src = imgUrl;
                    try { localStorage.setItem('savedTemplate', imgUrl); } catch(e) {}
                }
                reader.readAsDataURL(file);
            }
        });

        // Handle News Image Upload manually
        document.getElementById('news-image-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const imgUrl = event.target.result;
                    const newsImage = document.getElementById('news-image');
                    newsImage.style.backgroundImage = 'url(' + imgUrl + ')';
                    // Clear the URL input to avoid confusion
                    document.getElementById('image-url').value = '';
                }
                reader.readAsDataURL(file);
            }
        });

        function resetTemplate() {
            localStorage.removeItem('savedTemplate');
            const defaultTemplate = "/card-news-bg-default-v2.png";
            
            const templateImg = document.getElementById('template-bg');
            templateImg.src = defaultTemplate;
            const img = new Image();
            img.onload = function() {
                const ratio = img.height / img.width;
                document.getElementById('card-preview').style.height = (800 * ratio) + 'px';
            };
            img.src = defaultTemplate;
            alert("টেম্পলেট রিসেট করা হয়েছে এবং ডিফল্ট ব্যাকগ্রাউন্ড সেট করা হয়েছে।");
        }

        window.onload = function() {
            adjustFontSize();
            const saved = localStorage.getItem('savedTemplate');
            const templateSrc = saved ? saved : "/card-news-bg-default-v2.png";
            
            const templateImg = document.getElementById('template-bg');
            templateImg.src = templateSrc;
            const img = new Image();
            img.onload = function() {
                const ratio = img.height / img.width;
                document.getElementById('card-preview').style.height = (800 * ratio) + 'px';
            };
            img.src = templateSrc;
        };

        function updateImagePos() {
            const top = document.getElementById('pos-top').value;
            const height = document.getElementById('pos-height').value;
            document.getElementById('news-image').style.top = top + '%';
            document.getElementById('news-image').style.height = height + '%';
        }

        // Detect if running on local Python server or live PHP server
        const IS_LOCAL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1');
        const LOCAL_API_BASE = location.port === '8000' ? '' : 'http://localhost:8000';

        async function setProxiedImage(imgUrl) {
            if(!imgUrl) return;
            document.getElementById('news-image-upload').value = '';
            
            try {
                let response;
                if (IS_LOCAL) {
                    // Local: use Python proxy
                    response = await fetch(`${LOCAL_API_BASE}/proxy-image?url=${encodeURIComponent(imgUrl)}`);
                    if (!response.ok || (response.headers.get('content-type') || '').includes('text/html')) {
                        // Fallback to PHP even on local
                        response = await fetch(`proxy.php?action=image&url=${encodeURIComponent(imgUrl)}`);
                    }
                } else {
                    // Live server: use PHP proxy directly
                    response = await fetch(`proxy.php?action=image&url=${encodeURIComponent(imgUrl)}`);
                }

                if (!response.ok) throw new Error('Proxy failed: ' + response.status);
                
                const blob = await response.blob();
                const reader = new FileReader();
                reader.onloadend = () => {
                    document.getElementById('news-image').style.backgroundImage = 'url(' + reader.result + ')';
                };
                reader.readAsDataURL(blob);
            } catch (err) {
                console.error('Image proxy failed:', err);
                // Last resort: direct URL (may fail due to CORS)
                document.getElementById('news-image').style.backgroundImage = 'url(' + imgUrl + ')';
            }
        }

        async function fetchNewsData() {
            let url = document.getElementById('news-url').value.trim();
            if(!url) {
                alert("দয়া করে একটি লিংক দিন!");
                return;
            }
            if(!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
                document.getElementById('news-url').value = url;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('fetch-btn').disabled = true;

            try {
                let response;
                if (IS_LOCAL) {
                    // Local: try Python server first
                    response = await fetch(`${LOCAL_API_BASE}/fetch?url=${encodeURIComponent(url)}`);
                    if (response.status === 404 || (response.headers.get('content-type') || '').includes('text/html')) {
                        response = await fetch(`proxy.php?action=fetch&url=${encodeURIComponent(url)}`);
                    }
                } else {
                    // Live server: use PHP proxy directly
                    response = await fetch(`proxy.php?action=fetch&url=${encodeURIComponent(url)}`);
                }

                if (!response.ok) throw new Error("HTTP error! status: " + response.status);
                const data = await response.json();
                
                if (data.error) throw new Error(data.error);

                let title = data.title;
                if(title) {
                    title = title.replace(' - Janamat24', '').trim();
                    let part1 = title;
                    let part2 = "";
                    
                    const commaIdx = title.indexOf(",");
                    const colonIdx = title.indexOf("ঃ");
                    const engColonIdx = title.indexOf(":");
                    const dariIdx = title.indexOf("।");
                    
                    let splitIdx = -1;
                    const checkMiddle = (idx, len) => {
                        const pct = idx / len;
                        return pct >= 0.35 && pct <= 0.65;
                    };

                    if (commaIdx !== -1 && checkMiddle(commaIdx, title.length)) {
                        splitIdx = commaIdx;
                    } else if (colonIdx !== -1 && checkMiddle(colonIdx, title.length)) {
                        splitIdx = colonIdx;
                    } else if (engColonIdx !== -1 && checkMiddle(engColonIdx, title.length)) {
                        splitIdx = engColonIdx;
                    } else if (dariIdx !== -1 && checkMiddle(dariIdx, title.length)) {
                        splitIdx = dariIdx;
                    }

                    if (splitIdx !== -1) {
                        part1 = title.substring(0, splitIdx + 1).trim();
                        part2 = title.substring(splitIdx + 1).trim();
                    } else {
                        // Fallback: split in the middle by words
                        const words = title.split(" ");
                        const mid = Math.floor(words.length / 2);
                        part1 = words.slice(0, mid).join(" ");
                        part2 = words.slice(mid).join(" ");
                    }

                    document.getElementById('headline-1').value = part1;
                    document.getElementById('preview-line1').innerText = part1.replace(/ /g, "\u00A0");
                    
                    // We split part2 roughly to put first half in blue, second half in red
                    let part2Words = part2.split(' ');
                    if(part2Words.length > 1) {
                        const mid = Math.ceil(part2Words.length / 2);
                        const bluePart = part2Words.slice(0, mid).join(" ");
                        const redPart = part2Words.slice(mid).join(" ");
                        document.getElementById('headline-2-blue').value = bluePart;
                        document.getElementById('preview-line2-blue').innerText = bluePart.replace(/ /g, "\u00A0") + "\u00A0";
                        document.getElementById('headline-2-red').value = redPart;
                        document.getElementById('preview-line2-red').innerText = redPart.replace(/ /g, "\u00A0");
                    } else {
                        document.getElementById('headline-2-blue').value = "";
                        document.getElementById('preview-line2-blue').innerText = "";
                        document.getElementById('headline-2-red').value = part2;
                        document.getElementById('preview-line2-red').innerText = part2.replace(/ /g, "\u00A0");
                    }
                    adjustFontSize();
                }

                // Display category
                const category = data.category || '';
                const categoryBadge = document.getElementById('category-badge');
                if (category) {
                    categoryBadge.textContent = category;
                    categoryBadge.style.display = 'inline-block';
                } else {
                    categoryBadge.style.display = 'none';
                }

                // Display content and excerpt
                const contentDisplay = document.getElementById('news-content-display');
                const excerptDisplay = document.getElementById('news-excerpt-display');
                const detailPanel = document.getElementById('news-detail-panel');

                const excerpt = data.excerpt || '';
                const content = data.content || '';

                if (excerpt) {
                    excerptDisplay.textContent = excerpt;
                    excerptDisplay.style.display = 'block';
                } else {
                    excerptDisplay.style.display = 'none';
                }

                if (content) {
                    // Sanitize and display content paragraphs
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = content;
                    // Only allow <p> tags, strip everything else
                    const paragraphs = tempDiv.querySelectorAll('p');
                    let cleanHtml = '';
                    paragraphs.forEach(p => {
                        const text = p.textContent.trim();
                        if (text.length > 10) {
                            cleanHtml += `<p>${text}</p>`;
                        }
                    });
                    contentDisplay.innerHTML = cleanHtml || '<div class="no-content-msg">বিস্তারিত নিউজ পাওয়া যায়নি।</div>';
                } else if (excerpt) {
                    contentDisplay.innerHTML = `<p>${excerpt}</p>`;
                } else {
                    contentDisplay.innerHTML = '<div class="no-content-msg">বিস্তারিত নিউজ পাওয়া যায়নি।</div>';
                }
                detailPanel.style.display = 'block';

                let imgUrl = data.image;
                if(imgUrl) {
                    try { imgUrl = new URL(imgUrl, url).href; } catch(e) {}
                    document.getElementById('image-url').value = imgUrl;
                    await setProxiedImage(imgUrl);
                } else {
                    console.warn("No image found in the article.");
                }

            } catch (err) {
                console.error("Fetch Error:", err);
                alert("তথ্য আনতে সমস্যা হয়েছে। Error: " + err.message + "\nদয়া করে লিংকটি সঠিক কিনা চেক করুন।");
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('fetch-btn').disabled = false;
        }
        function downloadCard() {
            const preview = document.getElementById('card-preview');
            if(!document.getElementById('template-bg').src || document.getElementById('template-bg').src === window.location.href) {
                alert("প্রথমে টেমপ্লেট ছবিটি আপলোড করুন!");
                return;
            }
            html2canvas(preview, {
                useCORS: true,
                allowTaint: true,
                scale: 2
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'janamat24-card-' + new Date().getTime() + '.jpg';
                link.href = canvas.toDataURL('image/jpeg', 0.9);
                link.click();
            }).catch(err => {
                console.error(err);
                alert("ডাউনলোড করতে সমস্যা হচ্ছে।");
            });
        }
    </script>
</body>
</html>
